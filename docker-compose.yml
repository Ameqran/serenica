services:
  postgres:
    image: postgres:16
    container_name: serenica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: serenica
      POSTGRES_USER: serenica
      POSTGRES_PASSWORD: serenica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak-db:
    image: postgres:16
    container_name: serenica-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: serenica-keycloak
    restart: unless-stopped
    command: start-dev --import-realm --http-port=8081
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8081"
    volumes:
      - ./infra/keycloak/realm-serenica.json:/opt/keycloak/data/import/realm-serenica.json:ro
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      - keycloak-db

volumes:
  postgres_data:
  keycloak_db_data:
