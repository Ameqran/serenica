services:
  postgres:
    image: postgres:16
    container_name: serenica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: serenica
      POSTGRES_USER: serenica
      POSTGRES_PASSWORD: serenica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
